<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Divyansh Bhadauriya | Premium Portfolio</title>
    <meta name="title" content="Divyansh Bhadauriya | Premium Portfolio" />
    <meta name="description" content="Divyansh Bhadauriya - Senior Full Stack Developer. Specializing in high-performance React frontends and secure Django REST API backend design." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.com" />
    <meta property="og:title" content="Divyansh Bhadauriya | Premium Portfolio" />
    <meta property="og:description" content="Divyansh Bhadauriya - Senior Full Stack Developer. Specializing in high-performance React frontends and secure Django REST API backend design." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Divyansh Bhadauriya | Premium Portfolio" />
    <!-- Prevent flash of incorrect theme on initial load -->
    <script>
      (function() {
        try {
          const saved = localStorage.getItem("theme");
          const preference = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = saved || (preference ? "dark" : "light");
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-[#F8FAFC] dark:bg-[#0A0F1C] text-zinc-800 dark:text-zinc-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
